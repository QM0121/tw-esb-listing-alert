name: Monitor ESB Listing Alerts

on:
  workflow_dispatch:
    inputs:
      mail_test:
        description: "只寄出 Mail 測試信，不更新資料"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      mail_test_recipient:
        description: "測試信收件人；可空白，空白時使用 EMAIL_RECIPIENTS / 訂閱名單"
        required: false
        default: ""

  # 這段 GitHub 自己的排程可留著當備援
  # 但真正穩定觸發會改靠 cron-job.org
  schedule:
    - cron: "30 * * * *"

permissions:
  contents: write

concurrency:
  group: esb-listing-alert-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}
          EMAIL_SUBSCRIBERS_URL: ${{ secrets.EMAIL_SUBSCRIBERS_URL }}
          MAIL_TEST_MODE: ${{ github.event.inputs.mail_test }}
          MAIL_TEST_RECIPIENTS: ${{ github.event.inputs.mail_test_recipient }}
        run: python monitor.py

      - name: Commit updated alert data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/seen.json docs/data/alerts.json docs/data/status.json
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "Update alert data [skip ci]"
            git push
          fi
