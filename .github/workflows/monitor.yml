name: Monitor ESB Listing Alerts

on:
  workflow_dispatch:

  # 這段 GitHub 自己的排程可留著當備援
  # 但真正穩定觸發會改靠 cron-job.org
  schedule:
    - cron: "2,7,12,17,22,27,32,37,42,47,52,57 * * * *"
      timezone: "Asia/Taipei"

permissions:
  contents: write

concurrency:
  group: esb-listing-alert-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}
        run: python monitor.py

      - name: Commit updated alert data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/seen.json docs/data/alerts.json docs/data/status.json
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "Update alert data [skip ci]"
            git push
          fi
