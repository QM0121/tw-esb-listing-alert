<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>進行中案件｜台灣興櫃轉板進度監測站</title>
  <style>
    :root {
      --bg: #f3f5f8;
      --surface: #ffffff;
      --surface-soft: #f8fafc;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #d7dee8;
      --navy: #19324d;
      --navy-2: #284b6f;
      --blue-soft: #eef4fb;
      --green-soft: #edf7f1;
      --amber-soft: #fff7ec;
      --green: #1f7a4d;
      --amber: #a16207;
      --shadow: 0 8px 24px rgba(15, 23, 42, .05);
      --radius-xl: 24px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", "Heiti TC", Arial, sans-serif;
      letter-spacing: .01em;
    }

    a { color: inherit; }

    .shell {
      max-width: 1380px;
      margin: 0 auto;
      padding-left: 22px;
      padding-right: 22px;
    }

    .site-header {
      background: rgba(255,255,255,.96);
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(8px);
    }

    .header-inner {
      min-height: 76px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
    }

    .brand-title {
      margin: 0;
      color: var(--navy);
      font-size: clamp(24px, 2.25vw, 34px);
      font-weight: 900;
      line-height: 1.12;
    }

    .brand-subtitle {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
      font-weight: 600;
      line-height: 1.6;
    }

    .back-link {
      text-decoration: none;
      color: var(--navy);
      border: 1px solid var(--line);
      background: white;
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 800;
      white-space: nowrap;
    }

    .back-link:hover { background: var(--surface-soft); }

    .page { padding-top: 22px; padding-bottom: 34px; }

    .hero, .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      border-radius: var(--radius-xl);
    }

    .hero {
      padding: 22px 24px;
      margin-bottom: 16px;
    }

    .hero-title {
      margin: 0;
      color: var(--navy);
      font-size: clamp(28px, 2.6vw, 40px);
      line-height: 1.2;
      font-weight: 900;
    }

    .hero-desc {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.8;
      font-weight: 600;
    }

    .panel {
      padding: 18px 20px 20px;
      margin-bottom: 16px;
    }

    .panel-title {
      margin: 0 0 14px;
      color: var(--navy);
      font-size: 18px;
      line-height: 1.45;
      font-weight: 900;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .summary-card {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fbfcfe;
      padding: 14px;
    }

    .summary-label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      line-height: 1.5;
      margin-bottom: 6px;
    }

    .summary-value {
      color: var(--navy);
      font-size: 28px;
      font-weight: 900;
      line-height: 1.25;
    }

    .filter-grid {
      display: grid;
      grid-template-columns: minmax(320px, 1fr) 240px auto;
      gap: 12px;
      align-items: start;
    }

    .search-box, .track-select, .reset-btn {
      height: 54px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
    }

    .search-box, .track-select {
      width: 100%;
      border: 1px solid var(--line);
      background: white;
      color: var(--text);
      padding: 0 14px;
      outline: none;
    }

    .reset-btn {
      border: 0;
      background: var(--navy);
      color: white;
      padding: 0 18px;
      font-weight: 900;
      cursor: pointer;
    }

    .reset-btn:hover { background: var(--navy-2); }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .result-count {
      display: inline-flex;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface-soft);
      color: var(--navy);
      font-size: 13px;
      font-weight: 800;
      padding: 8px 12px;
    }

    .cases-list {
      display: grid;
      gap: 12px;
    }

    .case-card {
      display: grid;
      grid-template-columns: 164px 1fr;
      gap: 18px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: white;
      padding: 16px;
    }

    .date-box {
      border: 1px solid #d9e2ee;
      background: #f8fbff;
      border-radius: 14px;
      min-height: 140px;
      padding: 14px 12px;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .date-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .06em;
      margin-bottom: 8px;
    }

    .date-value {
      color: var(--navy);
      font-size: 22px;
      line-height: 1.4;
      font-weight: 900;
      white-space: nowrap;
      word-break: normal;
    }

    .case-main {
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-width: 0;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 9px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 7px 11px;
      font-size: 13px;
      font-weight: 800;
    }

    .badge.type { background: var(--blue-soft); color: var(--navy); }
    .badge.stage { background: var(--green-soft); color: var(--green); }
    .badge.source { background: var(--amber-soft); color: var(--amber); }

    .case-title {
      margin: 12px 0 0;
      color: var(--text);
      font-size: 16px;
      line-height: 1.8;
      font-weight: 900;
    }

    .empty-state {
      border: 1px dashed #ccd6e4;
      border-radius: 14px;
      background: #fafbfd;
      padding: 28px 18px;
      text-align: center;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.8;
      font-weight: 600;
    }

    @media (max-width: 920px) {
      .header-inner {
        flex-direction: column;
        align-items: flex-start;
        padding-top: 14px;
        padding-bottom: 14px;
      }

      .summary-grid,
      .filter-grid,
      .case-card {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 720px) {
      .shell { padding-left: 14px; padding-right: 14px; }
      .case-company { font-size: 20px; }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="shell header-inner">
      <div>
        <h1 class="brand-title">台灣興櫃轉板進度監測站</h1>
        <p class="brand-subtitle">目前進行中案件｜完整清單</p>
      </div>
      <a class="back-link" href="./index.html">返回首頁</a>
    </div>
  </header>

  <main class="shell page">
    <section class="hero">
      <h2 class="hero-title">目前進行中案件</h2>
      <p class="hero-desc">此頁整理仍可判定為進行中的申請案件，並依最新已知事件日期排序。</p>
    </section>

    <section class="panel">
      <h2 class="panel-title">案件摘要</h2>
      <div id="summaryGrid" class="summary-grid"></div>
    </section>

    <section class="panel">
      <h2 class="panel-title">搜尋與篩選</h2>
      <div class="filter-grid">
        <input id="search" class="search-box" type="search" placeholder="搜尋公司代號或公司名稱" />
        <select id="trackSelect" class="track-select">
          <option value="">全部申請類型</option>
          <option value="申請上市">申請上市</option>
          <option value="申請上櫃">申請上櫃</option>
          <option value="申請創新板上市">申請創新板上市</option>
        </select>
        <button id="reset" class="reset-btn" type="button">清除篩選</button>
      </div>
    </section>

    <section class="panel">
      <div class="toolbar">
        <h2 class="panel-title" style="margin:0;">案件清單</h2>
        <div class="result-count">符合條件共 <span id="caseCount">—</span> 件</div>
      </div>
      <div id="casesList" class="cases-list"></div>
    </section>
  </main>

  <script>
    const searchEl = document.getElementById("search");
    const trackEl = document.getElementById("trackSelect");
    const resetEl = document.getElementById("reset");
    const casesListEl = document.getElementById("casesList");

    let events = [];
    let cases = [];

    function esc(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function normalize(value) {
      return String(value ?? "").trim().toLowerCase();
    }

    function formatROCDate(value) {
      const raw = String(value ?? "").trim();
      if (!raw) return "—";

      let m = raw.match(/^(\d{4})(\d{2})(\d{2})$/);
      if (m) return `${Number(m[1]) - 1911}/${m[2]}/${m[3]}`;

      m = raw.match(/^(\d{3})(\d{2})(\d{2})$/);
      if (m) return `${m[1]}/${m[2]}/${m[3]}`;

      m = raw.match(/^(\d{4})[-/.](\d{1,2})[-/.](\d{1,2})$/);
      if (m) return `${Number(m[1]) - 1911}/${String(m[2]).padStart(2, "0")}/${String(m[3]).padStart(2, "0")}`;

      m = raw.match(/^(\d{2,3})[-/.](\d{1,2})[-/.](\d{1,2})$/);
      if (m) return `${m[1]}/${String(m[2]).padStart(2, "0")}/${String(m[3]).padStart(2, "0")}`;

      return raw;
    }

    function eventDateRank(value) {
      const raw = String(value ?? "").trim();
      if (!raw) return 0;

      let m = raw.match(/^(\d{4})(\d{2})(\d{2})$/);
      if (m) return Number(`${m[1]}${m[2]}${m[3]}`);

      m = raw.match(/^(\d{3})(\d{2})(\d{2})$/);
      if (m) return Number(`${Number(m[1]) + 1911}${m[2]}${m[3]}`);

      m = raw.match(/^(\d{4})[-/.](\d{1,2})[-/.](\d{1,2})$/);
      if (m) return Number(`${m[1]}${String(m[2]).padStart(2, "0")}${String(m[3]).padStart(2, "0")}`);

      m = raw.match(/^(\d{2,3})[-/.](\d{1,2})[-/.](\d{1,2})$/);
      if (m) return Number(`${Number(m[1]) + 1911}${String(m[2]).padStart(2, "0")}${String(m[3]).padStart(2, "0")}`);

      return 0;
    }

    function sortEventsByDateDesc(list) {
      return [...list].sort((a, b) => {
        const dateDiff = eventDateRank(b.event_date) - eventDateRank(a.event_date);
        if (dateDiff !== 0) return dateDiff;
        return String(b.first_seen_at || "").localeCompare(String(a.first_seen_at || ""));
      });
    }

    function applicationTrackForCompany(companyEvents) {
      if (companyEvents.some(event => event.event_type === "申請創新板上市")) return "申請創新板上市";
      if (companyEvents.some(event => event.event_type === "申請上櫃")) return "申請上櫃";
      if (companyEvents.some(event => event.event_type === "申請上市")) return "申請上市";
      return "轉板進度";
    }

    function isTerminalEvent(event) {
      const title = String(event.title || "");
      const detail = String(event.detail || "");
      const text = `${title} ${detail}`;
      return event.stage === "撤回申請"
        || text.includes("股票上市買賣日期已更新")
        || text.includes("股票上櫃買賣日期已更新")
        || text.includes("開始買賣日期");
    }

    function buildActiveCases() {
      const map = new Map();

      events.forEach(event => {
        const code = String(event.company_code || "").trim();
        const name = String(event.company_name || "").trim();
        if (!code && !name) return;

        const key = code || name;
        if (!map.has(key)) map.set(key, { code, name, events: [] });
        map.get(key).events.push(event);
      });

      const result = [];

      map.forEach(group => {
        const sorted = sortEventsByDateDesc(group.events);
        const latest = sorted[0];
        if (!latest) return;

        const track = applicationTrackForCompany(group.events);
        if (!["申請上市", "申請上櫃", "申請創新板上市"].includes(track)) return;
        if (isTerminalEvent(latest)) return;

        result.push({
          code: group.code,
          name: group.name,
          track,
          latest
        });
      });

      return result.sort((a, b) => {
        const dateDiff = eventDateRank(b.latest.event_date) - eventDateRank(a.latest.event_date);
        if (dateDiff !== 0) return dateDiff;
        return String(a.name || a.code).localeCompare(String(b.name || b.code), "zh-Hant", { numeric: true });
      });
    }

    function renderSummary() {
      const counts = { "申請上市": 0, "申請上櫃": 0, "申請創新板上市": 0 };
      cases.forEach(item => { if (counts[item.track] !== undefined) counts[item.track] += 1; });

      document.getElementById("summaryGrid").innerHTML = Object.entries(counts).map(([label, count]) => `
        <div class="summary-card">
          <div class="summary-label">${esc(label)}</div>
          <div class="summary-value">${esc(count)}</div>
        </div>
      `).join("");
    }

    function filteredCases() {
      const q = normalize(searchEl.value);
      const track = trackEl.value;

      return cases.filter(item => {
        const company = `${item.name || ""} ${item.code || ""}`.toLowerCase();
        const qOk = !q || company.includes(q);
        const trackOk = !track || item.track === track;
        return qOk && trackOk;
      });
    }

    function renderCases() {
      const filtered = filteredCases();
      document.getElementById("caseCount").textContent = filtered.length;

      if (!filtered.length) {
        casesListEl.innerHTML = '<div class="empty-state">目前沒有符合條件的進行中案件。</div>';
        return;
      }

      casesListEl.innerHTML = filtered.map(item => {
        const company = `${item.name || "公司名稱待解析"}${item.code ? `（${item.code}）` : ""}`;
        return `
          <article class="case-card">
            <div class="date-box">
              <div class="date-label">最新事件日期</div>
              <div class="date-value">${esc(formatROCDate(item.latest.event_date || "—"))}</div>
            </div>
            <div class="case-main">
              <div class="badges">
                <span class="badge type">${esc(item.track)}</span>
                <span class="badge stage">${esc(item.latest.stage || "最新進度")}</span>
                <span class="badge source">${esc(item.latest.source_label || "")}</span>
              </div>
              <p class="case-title" style="margin-top:10px;">${esc(item.latest.title || "")}</p>
            </div>
          </article>
        `;
      }).join("");
    }

    async function init() {
      const res = await fetch("./data/alerts.json", { cache: "no-store" });
      events = res.ok ? await res.json() : [];
      cases = buildActiveCases();
      renderSummary();
      renderCases();
    }

    searchEl.addEventListener("input", renderCases);
    trackEl.addEventListener("change", renderCases);
    resetEl.addEventListener("click", () => {
      searchEl.value = "";
      trackEl.value = "";
      renderCases();
    });

    init();
  </script>
</body>
</html>
