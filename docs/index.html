<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>台灣興櫃轉板進度監測站</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #172033;
      --muted: #667085;
      --line: #dfe5ef;
      --accent: #182338;
      --soft: #eef3ff;
      --soft2: #f6f8fc;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
    }
    .wrap { max-width: 1240px; margin: 0 auto; padding: 28px 18px 56px; }
    .hero {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 28px;
      box-shadow: 0 18px 50px rgba(20, 31, 54, .07);
    }
    h1 { margin: 0 0 10px; font-size: clamp(30px, 4vw, 48px); line-height: 1.1; }
    .subtitle { margin: 0; color: var(--muted); line-height: 1.8; font-size: 16px; }
    .notice { margin-top: 12px; color: var(--muted); font-size: 13px; line-height: 1.7; }
    .stats {
      margin-top: 22px;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }
    .stat {
      border: 1px solid var(--line);
      background: var(--soft2);
      border-radius: 18px;
      padding: 16px;
    }
    .stat .label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 8px; }
    .stat .value { font-size: 24px; font-weight: 800; }
    .filters {
      margin: 20px 0;
      padding: 18px;
      border: 1px solid var(--line);
      background: var(--card);
      border-radius: 22px;
      display: grid;
      gap: 14px;
    }
    .filter-row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
    input, select, button {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: white;
      padding: 12px 14px;
      font-size: 15px;
    }
    input { flex: 1; min-width: 260px; }
    select { min-width: 190px; }
    button {
      cursor: pointer;
      font-weight: 700;
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip {
      border: 1px solid var(--line);
      background: white;
      color: var(--text);
      padding: 9px 12px;
      border-radius: 999px;
      font-size: 14px;
      cursor: pointer;
      user-select: none;
    }
    .chip.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    .board {
      display: grid;
      grid-template-columns: 1.1fr .9fr;
      gap: 16px;
      margin-bottom: 16px;
    }
    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 18px;
    }
    .panel h2 { margin: 0 0 14px; font-size: 18px; }
    .mini-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .mini {
      border-radius: 16px;
      padding: 14px;
      background: var(--soft2);
      border: 1px solid var(--line);
    }
    .mini .k { display: block; color: var(--muted); font-size: 13px; margin-bottom: 6px; }
    .mini .v { font-weight: 800; font-size: 20px; }
    .sources { display: grid; gap: 10px; }
    .source-row { display: flex; justify-content: space-between; gap: 12px; padding: 12px; border: 1px solid var(--line); border-radius: 15px; background: var(--soft2); }
    .events { display: grid; gap: 14px; }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(20, 31, 54, .045);
    }
    .card-top { display: flex; justify-content: space-between; gap: 14px; flex-wrap: wrap; }
    .company { margin: 0 0 8px; font-size: 21px; font-weight: 900; }
    .meta { color: var(--muted); font-size: 14px; line-height: 1.7; text-align: right; }
    .badges { display: flex; gap: 8px; flex-wrap: wrap; }
    .badge {
      display: inline-flex;
      align-items: center;
      background: var(--soft);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 13px;
      font-weight: 800;
    }
    .title { margin: 15px 0 8px; font-size: 16px; line-height: 1.75; }
    .detail { margin: 0 0 14px; color: var(--muted); line-height: 1.7; font-size: 14px; }
    .link {
      display: inline-block;
      text-decoration: none;
      padding: 10px 14px;
      border-radius: 13px;
      background: var(--accent);
      color: white;
      font-size: 14px;
      font-weight: 800;
    }
    .empty {
      background: white;
      border: 1px dashed var(--line);
      border-radius: 20px;
      padding: 26px;
      color: var(--muted);
    }
    .footer { margin-top: 24px; color: var(--muted); line-height: 1.8; font-size: 13px; }
    @media (max-width: 920px) {
      .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .board { grid-template-columns: 1fr; }
    }
    @media (max-width: 620px) {
      .wrap { padding: 16px 12px 42px; }
      .hero { padding: 20px; }
      .stats, .mini-grid { grid-template-columns: 1fr; }
      .meta { text-align: left; }
      input, select, button { width: 100%; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <h1>台灣興櫃轉板進度監測站</h1>
      <p class="subtitle">
        集中追蹤興櫃公司申請上市、申請上櫃、申請創新板上市，以及送件、受理、
        審議通過、董事會決議申請、撤回申請與其他轉板進度重大更新。
      </p>
      <p class="notice">
        本站由 GitHub Actions 自動更新；Telegram 通知與網站資料同步。
        「受理」欄位以公司新出現在官方申請公司清單作為追蹤訊號，實際程序仍以官方原文為準。
      </p>
      <div class="stats">
        <div class="stat"><span class="label">最近更新</span><span class="value" id="lastChecked">—</span></div>
        <div class="stat"><span class="label">網站事件總數</span><span class="value" id="totalEvents">—</span></div>
        <div class="stat"><span class="label">本輪新增事件</span><span class="value" id="newEvents">—</span></div>
        <div class="stat"><span class="label">本輪 Telegram 推播</span><span class="value" id="telegramSent">—</span></div>
      </div>
    </section>

    <section class="filters">
      <div class="filter-row">
        <input id="search" type="search" placeholder="搜尋公司名稱、代號、公告標題或進度內容" />
        <select id="sourceSelect">
          <option value="">全部來源</option>
        </select>
        <button id="reset">清除篩選</button>
      </div>
      <div class="chips" id="chips"></div>
    </section>

    <section class="board">
      <div class="panel">
        <h2>事件類型摘要</h2>
        <div class="mini-grid" id="typeSummary"></div>
      </div>
      <div class="panel">
        <h2>資料來源本輪抓取</h2>
        <div class="sources" id="sourceSummary"></div>
      </div>
    </section>

    <section id="events" class="events"></section>

    <p class="footer">
      來源包含：公開資訊觀測站即時重大訊息、證交所申請上市公司、
      櫃買中心申請上櫃公司、臺灣創新板新聞稿。本站僅供資訊追蹤，不構成投資建議。
    </p>
  </main>

  <script>
    const CATEGORY_OPTIONS = [
      "全部",
      "申請上市",
      "申請上櫃",
      "申請創新板上市",
      "轉板進度重大更新",
      "送件",
      "受理",
      "審議通過",
      "董事會決議申請",
      "撤回申請"
    ];

    const searchEl = document.getElementById("search");
    const sourceEl = document.getElementById("sourceSelect");
    const resetEl = document.getElementById("reset");
    const chipsEl = document.getElementById("chips");
    const eventsEl = document.getElementById("events");
    const typeSummaryEl = document.getElementById("typeSummary");
    const sourceSummaryEl = document.getElementById("sourceSummary");

    let events = [];
    let status = {};
    let activeCategory = "全部";

    function esc(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function renderChips() {
      chipsEl.innerHTML = CATEGORY_OPTIONS.map(label => `
        <span class="chip ${label === activeCategory ? "active" : ""}" data-category="${esc(label)}">${esc(label)}</span>
      `).join("");
      chipsEl.querySelectorAll(".chip").forEach(chip => {
        chip.addEventListener("click", () => {
          activeCategory = chip.dataset.category;
          renderChips();
          renderEvents();
        });
      });
    }

    function renderStatus() {
      document.getElementById("lastChecked").textContent = status.last_checked_at || "—";
      document.getElementById("totalEvents").textContent = status.total_event_count ?? events.length ?? "—";
      document.getElementById("newEvents").textContent = status.new_event_count ?? "—";
      document.getElementById("telegramSent").textContent = status.telegram_sent_count ?? "—";

      const typeCounts = status.summary?.type_counts || {};
      const displayTypes = ["申請上市", "申請上櫃", "申請創新板上市", "轉板進度重大更新"];
      typeSummaryEl.innerHTML = displayTypes.map(type => `
        <div class="mini">
          <span class="k">${esc(type)}</span>
          <span class="v">${esc(typeCounts[type] ?? 0)}</span>
        </div>
      `).join("");

      const sources = status.sources || {};
      sourceSummaryEl.innerHTML = Object.entries(sources).map(([_, item]) => `
        <div class="source-row">
          <span>${esc(item.label)}</span>
          <strong>${esc(item.fetched ?? 0)} 筆</strong>
        </div>
      `).join("") || '<div class="empty">尚無來源抓取資訊。</div>';
    }

    function renderSourceOptions() {
      const labels = [...new Set(events.map(event => event.source_label).filter(Boolean))];
      sourceEl.innerHTML = '<option value="">全部來源</option>' + labels.map(label => `
        <option value="${esc(label)}">${esc(label)}</option>
      `).join("");
    }

    function matchesCategory(event) {
      if (activeCategory === "全部") return true;
      return event.event_type === activeCategory || event.stage === activeCategory;
    }

    function renderEvents() {
      const keyword = searchEl.value.trim().toLowerCase();
      const source = sourceEl.value;

      const filtered = events.filter(event => {
        const haystack = [
          event.company_name,
          event.company_code,
          event.title,
          event.detail,
          event.event_type,
          event.stage,
          event.source_label
        ].join(" ").toLowerCase();

        const keywordOk = !keyword || haystack.includes(keyword);
        const sourceOk = !source || event.source_label === source;
        return keywordOk && sourceOk && matchesCategory(event);
      });

      if (!filtered.length) {
        eventsEl.innerHTML = '<div class="empty">目前沒有符合篩選條件的事件。</div>';
        return;
      }

      eventsEl.innerHTML = filtered.map(event => {
        const company = event.company_name || "公司名稱待解析";
        const code = event.company_code ? `（${event.company_code}）` : "";
        return `
          <article class="card">
            <div class="card-top">
              <div>
                <h2 class="company">${esc(company)}${esc(code)}</h2>
                <div class="badges">
                  <span class="badge">${esc(event.event_type)}</span>
                  <span class="badge">${esc(event.stage)}</span>
                  <span class="badge">${esc(event.source_label)}</span>
                </div>
              </div>
              <div class="meta">
                事件日期：${esc(event.event_date || "—")}<br />
                系統首次偵測：${esc(event.first_seen_at || "—")}
              </div>
            </div>
            <p class="title">${esc(event.title)}</p>
            <p class="detail">${esc(event.detail || "")}</p>
            <a class="link" href="${esc(event.url)}" target="_blank" rel="noopener noreferrer">查看官方來源</a>
          </article>
        `;
      }).join("");
    }

    async function init() {
      try {
        const [eventsRes, statusRes] = await Promise.all([
          fetch("./data/alerts.json", { cache: "no-store" }),
          fetch("./data/status.json", { cache: "no-store" }),
        ]);
        events = eventsRes.ok ? await eventsRes.json() : [];
        status = statusRes.ok ? await statusRes.json() : {};
        renderChips();
        renderSourceOptions();
        renderStatus();
        renderEvents();
      } catch (error) {
        eventsEl.innerHTML = '<div class="empty">資料讀取失敗，請稍後重新整理。</div>';
      }
    }

    searchEl.addEventListener("input", renderEvents);
    sourceEl.addEventListener("change", renderEvents);
    resetEl.addEventListener("click", () => {
      searchEl.value = "";
      sourceEl.value = "";
      activeCategory = "全部";
      renderChips();
      renderEvents();
    });

    init();
  </script>
</body>
</html>
