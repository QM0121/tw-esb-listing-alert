name: Test Telegram Notification

on:
  workflow_dispatch:

jobs:
  test-telegram:
    runs-on: ubuntu-latest

    steps:
      - name: Send Telegram test message
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          RESPONSE=$(curl -sS --fail-with-body -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=✅ Telegram 推播測試成功｜台灣興櫃轉板進度監測站")
          echo "$RESPONSE"
